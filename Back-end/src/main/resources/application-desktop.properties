# Match the hostname used by the packaged frontend while remaining bound to the
# local machine only. This prevents localhost login requests from missing an
# IPv4-only 127.0.0.1 listener or being treated as cross-origin by JavaFX WebView.
server.address=localhost

spring.datasource.url=jdbc:h2:file:${user.home}/.stealthsync/stealthsync-db;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.username=stealthsync
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=update

stealthsync.vault.directory=${user.home}/.stealthsync
stealthsync.open-browser=false

stealthsync.google-drive.client-id=${GOOGLE_DRIVE_CLIENT_ID:}
stealthsync.google-drive.client-secret=${GOOGLE_DRIVE_CLIENT_SECRET:}
stealthsync.google-drive.redirect-uri=${GOOGLE_DRIVE_REDIRECT_URI:http://localhost:${server.port}/cloud-storage/oauth/google/callback}
# Optional demo account hint and target folder; credentials remain environment-only.
stealthsync.google-drive.login-hint=${GOOGLE_DRIVE_LOGIN_HINT:}
stealthsync.google-drive.folder-id=${GOOGLE_DRIVE_FOLDER_ID:}

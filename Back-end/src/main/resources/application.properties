server.port=8080

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/stealthsync}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

stealthsync.vault.directory=${STEALTHSYNC_VAULT_DIR:}

stealthsync.google-drive.client-id=${GOOGLE_DRIVE_CLIENT_ID:}
stealthsync.google-drive.client-secret=${GOOGLE_DRIVE_CLIENT_SECRET:}
stealthsync.google-drive.redirect-uri=${GOOGLE_DRIVE_REDIRECT_URI:http://localhost:${server.port}/cloud-storage/oauth/google/callback}
# Optional demo account hint and target folder; credentials remain environment-only.
stealthsync.google-drive.login-hint=${GOOGLE_DRIVE_LOGIN_HINT:}
stealthsync.google-drive.folder-id=${GOOGLE_DRIVE_FOLDER_ID:}

# Use JWT_SECRET in shared or production environments.
stealthsync.jwt.secret=${JWT_SECRET:stealthsync-development-jwt-secret-change-before-release}
stealthsync.jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:3600}

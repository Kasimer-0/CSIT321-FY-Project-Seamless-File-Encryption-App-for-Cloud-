name: Desktop Release

on:
  push:
    tags:
      - "desktop-v*"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Test and publish Windows installer
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: Front-end/package-lock.json

      - name: Install frontend dependencies
        working-directory: Front-end
        run: npm ci

      - name: Build smoke-test app image
        shell: pwsh
        run: ./scripts/build-desktop.ps1 -PackageType app-image -SkipTests -JdkHome $env:JAVA_HOME -ServerPort 18080 -OpenBrowser:$false

      - name: Smoke-test packaged application
        shell: pwsh
        run: ./scripts/test-desktop-app.ps1 -Port 18080

      - name: Build Windows installer
        shell: pwsh
        run: ./scripts/build-desktop.ps1 -PackageType exe -SkipTests -SkipFrontendBuild -SkipBackendBuild -JdkHome $env:JAVA_HOME -AppVersion 1.0.2

      - name: Build Windows MSI
        shell: pwsh
        run: ./scripts/build-desktop.ps1 -PackageType msi -SkipTests -SkipFrontendBuild -SkipBackendBuild -JdkHome $env:JAVA_HOME -AppVersion 1.0.2

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        shell: pwsh
        run: |
          gh release create $env:RELEASE_TAG `
            dist-desktop/StealthSync-Setup-1.0.2.exe `
            dist-desktop/StealthSync-1.0.2.msi `
            --title "StealthSync Windows Installer" `
            --notes "Self-contained Windows installer for StealthSync.

          Included asset:
          - StealthSync-Setup-1.0.2.exe
          - StealthSync-1.0.2.msi

          How to run:
          1. Download and run StealthSync-Setup-1.0.2.exe.
          2. Launch StealthSync from the desktop or Start Menu shortcut after installation.

          This desktop build includes its own Java runtime and local database. PostgreSQL and DB_PASSWORD are not required."
